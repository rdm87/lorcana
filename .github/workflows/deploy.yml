name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/git

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        working-directory: online-league/frontend
        run: flutter pub get

      - name: Build Flutter web
        working-directory: online-league/frontend
        run: flutter build web --release --no-tree-shake-icons

      # ── SSH setup ────────────────────────────────────────────────────────────

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ── Sync source code (without secrets, venv, build artifacts) ────────────

      - name: Sync source to server
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude 'lorcana.db' \
            --exclude 'frontend/.dart_tool/' \
            --exclude 'frontend/build/' \
            --exclude 'frontend/pubspec.lock' \
            -e "ssh -i ~/.ssh/deploy_key" \
            online-league/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/"

      # ── Sync built Flutter web separately ────────────────────────────────────

      - name: Sync Flutter web build
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            online-league/frontend/build/web/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/frontend/build/web/"

      # ── Deploy on server ─────────────────────────────────────────────────────

      - name: Docker Compose up
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd ${{ env.DEPLOY_PATH }} && docker compose up --build -d --remove-orphans"
