name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/git/lorcana/online-league

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        working-directory: online-league/frontend
        run: flutter pub get

      - name: Build Flutter web
        working-directory: online-league/frontend
        run: flutter build web --release --no-tree-shake-icons --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}

      # ── React build ──────────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: online-league/frontend-react/package-lock.json

      - name: React dependencies
        working-directory: online-league/frontend-react
        run: npm ci

      - name: Build React web
        working-directory: online-league/frontend-react
        run: npm run build
        # VITE_API_BASE_URL non impostato → API_BASE = '' → URL relative
        # nginx su porta 9090 proxy /api/ → backend

      # ── SSH setup ────────────────────────────────────────────────────────────

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ── Upload builds ─────────────────────────────────────────────────────────

      - name: Upload Flutter web build
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            online-league/frontend/build/web/ \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/ansible/lorcana-web/"

      - name: Upload React web build
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p /home/ansible/lorcana-react-web"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            online-league/frontend-react/dist/ \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/ansible/lorcana-react-web/"

      # ── Deploy on server ─────────────────────────────────────────────────────

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd /opt/git/lorcana && git pull && cd online-league && docker compose up --build -d --remove-orphans"
