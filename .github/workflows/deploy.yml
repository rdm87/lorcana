name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/git

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        working-directory: online-league/frontend
        run: flutter pub get

      - name: Build Flutter web
        working-directory: online-league/frontend
        run: flutter build web --release --no-tree-shake-icons

      # ── SSH setup ────────────────────────────────────────────────────────────

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ── Deploy on server ─────────────────────────────────────────────────────

      - name: Docker Compose up
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd ${{ env.DEPLOY_PATH }} && docker compose up --build -d --remove-orphans"
