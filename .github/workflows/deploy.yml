name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/git/lorcana/online-league

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        working-directory: online-league/frontend
        run: flutter pub get

      - name: Build Flutter web
        working-directory: online-league/frontend
        run: flutter build web --release --no-tree-shake-icons

      # ── SSH setup ────────────────────────────────────────────────────────────

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ── Upload Flutter web build ─────────────────────────────────────────────

      - name: Prepare web build directory
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p /opt/git/lorcana/online-league/frontend/build/web && chown -R ${{ vars.SERVER_USER }} /opt/git/lorcana/online-league/frontend/build"

      - name: Upload Flutter web build
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            online-league/frontend/build/web/ \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/git/lorcana/online-league/frontend/build/web/"

      # ── Deploy on server ─────────────────────────────────────────────────────

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ vars.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd /opt/git/lorcana && git pull && cd online-league && docker compose up --build -d --remove-orphans"
