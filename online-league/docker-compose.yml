services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lorcana
      POSTGRES_USER: lorcana
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lorcana"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://lorcana:${DB_PASSWORD}@db:5432/lorcana
    volumes:
      - ./logs/backend:/app/logs
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"    # Flutter web
      - "9090:9090"  # React web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ansible/lorcana-web:/usr/share/nginx/html:ro
      - /home/ansible/lorcana-react-web:/usr/share/nginx/react-web:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend

volumes:
  pgdata:
