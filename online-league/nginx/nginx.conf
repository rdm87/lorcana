# ── Flutter web — porta 8080 (esposta) ──────────────────────────────────────
server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Never cache Flutter entry points and service worker
    location ~* ^/(index\.html|flutter_service_worker\.js|flutter_bootstrap\.js|version\.json|manifest\.json)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── React web — porta 9090 (esposta) ────────────────────────────────────────
server {
    listen 9090;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    root /usr/share/nginx/react-web;
    index index.html;

    location /api/ {
        proxy_pass http://backend:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # No-cache su index.html (Vite non lo hasha)
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Long-term cache per asset hashati da Vite
    location ~* \.(js|css|png|jpg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: React Router gestisce il routing lato client
    location / {
        try_files $uri $uri/ /index.html;
    }
}
